# Alertmanager (generalized). Inject the SMTP password from a secret at deploy
# time — never commit a real credential. Port 587 negotiates TLS via STARTTLS.
global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.your-provider.example:587'
  smtp_from: 'alerts@example.com'
  smtp_auth_username: 'CHANGE_ME'
  smtp_auth_password: 'CHANGE_ME'
  smtp_require_tls: true

route:
  receiver: email
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: email
    email_configs:
      - to: 'you@example.com'
        send_resolved: true
