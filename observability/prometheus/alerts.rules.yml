# Generalized alert rules (no hostnames). Routed to Alertmanager by Prometheus.
groups:
  - name: host-and-services
    rules:
      - alert: ServiceDown
        expr: node_systemd_unit_state{state="active"} == 0
        for: 3m
        labels: { severity: critical }
        annotations:
          summary: "Service not active: {{ $labels.name }}"
          description: "systemd unit {{ $labels.name }} has not been active for >3m."
      - alert: DiskAlmostFull
        expr: 100 * (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}) > 90
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Disk over 90% full on {{ $labels.device }}"

  - name: fleet
    rules:
      - alert: SiteDown
        expr: probe_success{job="fleet-http"} == 0
        for: 3m
        labels: { severity: critical }
        annotations:
          summary: "Site down: {{ $labels.instance }}"
          description: "{{ $labels.instance }} has failed its HTTP probe for >3m."
      - alert: TLSCertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry{job="fleet-http"} - time()) < 14 * 24 * 3600
        for: 1h
        labels: { severity: warning }
        annotations:
          summary: "TLS cert expiring in <14d: {{ $labels.instance }}"

  - name: app
    rules:
      - alert: AppHighErrorRate
        expr: |
          sum(rate(app_http_requests_total{status=~"5.."}[5m]))
            / clamp_min(sum(rate(app_http_requests_total[5m])), 1) > 0.05
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Application 5xx rate above 5%"
