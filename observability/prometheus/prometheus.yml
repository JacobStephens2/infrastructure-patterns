# Prometheus scrape config (generalized). Exporters and the app /metrics bind to
# loopback; Prometheus pulls them. A blackbox exporter probes public URLs so the
# external (proxy/TLS/DNS) layer is covered too. See ADR 0011.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - /etc/prometheus/alerts.rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs: [{ targets: ['localhost:9090'] }]

  - job_name: node            # host metrics + systemd unit liveness
    static_configs: [{ targets: ['localhost:9100'] }]

  - job_name: app             # an application's own /metrics, on loopback
    metrics_path: /metrics
    static_configs: [{ targets: ['127.0.0.1:3470'] }]

  - job_name: fleet-http      # external blackbox probes of public sites
    metrics_path: /probe
    params: { module: [http_2xx] }
    static_configs:
      - targets:
          - https://service-a.example.com
          - https://service-b.example.com/health
          - https://service-c.example.com
    relabel_configs:
      - { source_labels: [__address__], target_label: __param_target }
      - { source_labels: [__param_target], target_label: instance }
      - { target_label: __address__, replacement: 127.0.0.1:9115 }
